
name: CI/CD Pipeline for Wellness Tourism Prediction

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install --no-cache-dir numpy==2.0.2 pandas==2.2.2 scikit-learn==1.6.1 matplotlib==3.9.4 seaborn==0.13.2 joblib==1.4.2 xgboost==2.1.4 requests==2.32.3 huggingface_hub==0.30.1 mlflow==3.0.1 streamlit==1.43.2

    - name: Execute Model Training and Saving
      run: |
        python model_building/train.py
      env:
        HF_TOKEN: ${ secrets.HF_TOKEN }

    - name: Execute Deployment to Hugging Face Space
      run: |
        python hosting/hosting.py
      env:
        HF_TOKEN: ${ secrets.HF_TOKEN }

